openapi: 3.0.3
info:
  title: HealthTrack API
  description: RESTful API for HealthTrack fitness and habit tracking application
  version: 1.0.0
  contact:
    name: HealthTrack Team
    url: https://github.com/anomalyco/HealthTrack-CSCI4710-Project

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://api.healthtrack.app
    description: Production server

security:
  - BearerAuth: []

paths:
  /users:
    get:
      summary: Get all users
      description: Retrieve all users (Admin only)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      summary: Register new user
      description: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 30
                  description: Unique username
                email:
                  type: string
                  format: email
                  description: User email address
                password:
                  type: string
                  minLength: 8
                  maxLength: 72
                  description: User password
              example:
                username: johndoe
                email: john@example.com
                password: securePass123
      responses:
        '200':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/login:
    post:
      summary: Login user
      description: Authenticate user and return JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                username:
                  type: string
                  description: Username (optional if email provided)
                email:
                  type: string
                  format: email
                  description: Email address (optional if username provided)
                password:
                  type: string
                  description: User password
              example:
                email: john@example.com
                password: securePass123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/logout:
    post:
      summary: Logout user
      description: Invalidate current session
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/session:
    get:
      summary: Get current session
      description: Retrieve active session information
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Session information
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  user_id:
                    type: integer
                  token:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
                  username:
                    type: string
                  email:
                    type: string
                  role:
                    type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: No active session found

  /todo/habits:
    get:
      summary: Get user habits
      description: Retrieve habits for current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of habits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Habit'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      summary: Create habit
      description: Create a new habit for current user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  maxLength: 120
                  description: Habit title
                frequency:
                  type: string
                  enum: [daily, weekly, monthly]
                  default: daily
                  description: Habit frequency
              example:
                title: Morning Run
                frequency: daily
      responses:
        '200':
          description: Habit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Habit'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /todo/habits/{id}:
    put:
      summary: Update habit
      description: Update habit title or frequency
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Habit ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 120
                frequency:
                  type: string
                  enum: [daily, weekly, monthly]
      responses:
        '200':
          description: Habit updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Habit'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Habit not found
    delete:
      summary: Delete habit
      description: Delete a habit (must belong to current user)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Habit ID
      responses:
        '200':
          description: Habit deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Habit not found

  /todo/workouts:
    get:
      summary: Get exercise library
      description: Retrieve all workouts in the exercise library
      responses:
        '200':
          description: List of workouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workout'
    post:
      summary: Create workout
      description: Add exercise to library (Admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  maxLength: 120
                  description: Exercise name
                description:
                  type: string
                  maxLength: 1000
                  description: Exercise description
              example:
                title: Bench Press
                description: Chest and triceps exercise
      responses:
        '200':
          description: Workout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workout'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /todo/workouts/{id}:
    put:
      summary: Update workout
      description: Update exercise name or description (Admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Workout ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 120
                description:
                  type: string
                  maxLength: 1000
                  nullable: true
      responses:
        '200':
          description: Workout updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workout'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Workout not found
    delete:
      summary: Delete workout
      description: Remove exercise from library (Admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Workout ID
      responses:
        '200':
          description: Workout deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Workout not found

  /todo/my-habits:
    get:
      summary: Get my habits
      description: Retrieve current user's habits
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of user's habits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Habit'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      summary: Create my habit
      description: Create a habit for current user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  maxLength: 120
                frequency:
                  type: string
                  enum: [daily, weekly, monthly]
                  default: daily
      responses:
        '200':
          description: Habit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Habit'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /todo/my-habits/{id}:
    delete:
      summary: Delete my habit
      description: Remove a habit from current user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Habit ID
      responses:
        '200':
          description: Habit removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Habit not found

  /todo/my-workouts:
    get:
      summary: Get my workout history
      description: Retrieve current user's logged workouts
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of logged workouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserWorkout'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      summary: Log workout
      description: Log a completed workout for current user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workout_id
              properties:
                workout_id:
                  type: integer
                  description: Exercise ID from workout library
                reps:
                  type: integer
                  minimum: 1
                  description: Number of repetitions
                sets:
                  type: integer
                  minimum: 1
                  description: Number of sets
                weight:
                  type: number
                  minimum: 0
                  description: Weight in lbs
              example:
                workout_id: 1
                reps: 10
                sets: 3
                weight: 135
      responses:
        '200':
          description: Workout logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWorkout'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Workout not found

  /todo/daily-log:
    get:
      summary: Get today's habits
      description: Retrieve today's habits with completion status
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Today's habits with status
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    habit_title:
                      type: string
                    frequency:
                      type: string
                    completed:
                      type: boolean
                    log_date:
                      type: string
                      format: date
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      summary: Toggle habit completion
      description: Toggle completion status for a habit on today's log
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - habit_id
                - completed
              properties:
                habit_id:
                  type: integer
                completed:
                  type: boolean
              example:
                habit_id: 1
                completed: true
      responses:
        '200':
          description: Habit completion updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Habit not found

  /todo/habits/{id}/history:
    get:
      summary: Get habit history
      description: Retrieve completion history for a specific habit (last 30 entries)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Habit ID
      responses:
        '200':
          description: Habit history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyLog'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /todo/admin/metrics:
    get:
      summary: Get admin metrics
      description: Retrieve platform statistics (Admin only)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Platform metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  usersCount:
                    type: integer
                    description: Total number of users
                  workoutsCount:
                    type: integer
                    description: Total number of exercises
                  dailyLogsCount:
                    type: integer
                    description: Total number of daily log entries
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /home:
    get:
      summary: Home dashboard
      description: Get user's habits and workouts for dashboard display
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /users/login endpoint

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [Standard, Admin]
          default: Standard
        created_at:
          type: string
          format: date-time

    Habit:
      type: object
      properties:
        id:
          type: integer
        habit_title:
          type: string
        frequency:
          type: string
          enum: [daily, weekly, monthly]
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time

    Workout:
      type: object
      properties:
        id:
          type: integer
        exercise_name:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    UserWorkout:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        workout_id:
          type: integer
        exercise_name:
          type: string
        description:
          type: string
        reps:
          type: integer
          nullable: true
        sets:
          type: integer
          nullable: true
        weight:
          type: number
          nullable: true
        completed_at:
          type: string
          format: date-time

    DailyLog:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        habit_id:
          type: integer
        completed:
          type: boolean
        log_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
          nullable: true

  responses:
    UnauthorizedError:
      description: Authentication information is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Invalid token

    ForbiddenError:
      description: User does not have permission to access this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Forbidden

    ValidationError:
      description: Invalid input data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: title is required
