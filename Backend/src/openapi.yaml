openapi: 3.0.0
info:
  title: HealthTrack API
  version: 1.0.0
  description: Full API documentation for HealthTrack backend

servers:
  - url: http://localhost:3000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string

    Habit:
      type: object
      properties:
        id:
          type: integer
        habit_title:
          type: string
        frequency:
          type: string
        created_at:
          type: string

    Workout:
      type: object
      properties:
        id:
          type: integer
        exercise_name:
          type: string
        description:
          type: string

    UserWorkout:
      type: object
      properties:
        id:
          type: integer
        workout_id:
          type: integer
        reps:
          type: integer
        sets:
          type: integer
        weight:
          type: number

    Session:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        token:
          type: string
        created_at:
          type: string
        expires_at:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          type: string

paths:

  # ===== USERS =====

  /users:
    get:
      summary: Get all users (Admin only)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of users
        

    post:
      summary: Register user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: User created
        400:
          description: Invalid input
        409:
          description: User exists

  /users/login:
    post:
      summary: Login user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login success

  /users/session:
    get:
      summary: Get current session
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Active session

  /users/logout:
    post:
      summary: Logout user
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Logged out

  # ===== HOME =====

  /home:
    get:
      summary: Get combined habits and workouts
      tags: [Home]
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string

  # ===== ADMIN =====

  /todo:
    get:
      summary: Get workout names (Admin)
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Workout list

  /todo/admin/metrics:
    get:
      summary: Get metrics
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Counts

  # ===== HABITS =====

  /todo/habits:
    get:
      summary: Get user habits
      tags: [Habits]
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of habits

    post:
      summary: Create habit
      tags: [Habits]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                frequency:
                  type: string
      responses:
        200:
          description: Created

  /todo/habits/{id}:
    put:
      summary: Update habit
      tags: [Habits]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Updated

    delete:
      summary: Delete habit
      tags: [Habits]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Deleted

  # ===== WORKOUTS =====

  /todo/workouts:
    get:
      summary: Get workouts
      tags: [Workouts]
      responses:
        200:
          description: Workout list

    post:
      summary: Create workout (Admin)
      tags: [Workouts]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Created

  /todo/workouts/{id}:
    put:
      summary: Update workout
      tags: [Workouts]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Updated

    delete:
      summary: Delete workout
      tags: [Workouts]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Deleted

  # ===== USER WORKOUTS =====

  /todo/my-workouts:
    get:
      summary: Get user workout history
      tags: [User Workouts]
      security:
        - bearerAuth: []
      responses:
        200:
          description: List

    post:
      summary: Log workout
      tags: [User Workouts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
      responses:
        200:
          description: Logged

  # ===== DAILY LOGS =====

  /todo/daily-log:
    get:
      summary: Get daily logs
      tags: [Daily Logs]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Logs

    post:
      summary: Toggle habit completion
      tags: [Daily Logs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
      responses:
        200:
          description: Updated

  /todo/habits/{id}/history:
    get:
      summary: Get habit history
      tags: [Daily Logs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: History